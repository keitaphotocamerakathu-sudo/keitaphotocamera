<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>สร้าง Event</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class"
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="../js/config.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: relative;
    }

    input,
    textarea,
    button,
    a {
      touch-action: manipulation;
    }

    input,
    textarea,
    button {
      font-size: 16px !important;
    }

    input,
    textarea {
      min-height: 56px;
    }

    textarea {
      min-height: 120px;
    }

    button {
      cursor: pointer;
    }

    .custom-picker-btn {
      width: 100%;
      min-height: 56px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .picker-backdrop {
      position: fixed;
      inset: 0;
      z-index: 99998;
      background: rgba(15, 23, 42, 0.72);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
    }

    .picker-backdrop.show {
      display: flex;
    }

    .picker-panel {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      color: #0f172a;
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      max-height: 88vh;
      overflow-y: auto;
    }

    .dark .picker-panel {
      background: #0f172a;
      color: #ffffff;
      border: 1px solid rgba(148, 163, 184, 0.22);
    }

    .date-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .date-cell,
    .day-name {
      min-height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .day-name {
      color: #64748b;
      min-height: 32px;
    }

    .date-cell {
      background: #f1f5f9;
      color: #0f172a;
    }

    .dark .date-cell {
      background: #1e293b;
      color: #ffffff;
    }

    .date-cell.active {
      background: #0f172a;
      color: #ffffff;
    }

    .dark .date-cell.active {
      background: #ffffff;
      color: #0f172a;
    }

    .date-cell.disabled {
      opacity: 0.25;
    }

    .status-option {
      width: 100%;
      min-height: 56px;
      border-radius: 18px;
      padding: 14px 16px;
      text-align: left;
      font-weight: 800;
      background: #f1f5f9;
      color: #0f172a;
      margin-top: 10px;
    }

    .dark .status-option {
      background: #1e293b;
      color: #ffffff;
    }

    .status-option.active {
      background: #0f172a;
      color: #ffffff;
    }

    .dark .status-option.active {
      background: #ffffff;
      color: #0f172a;
    }

    .swal2-container {
      z-index: 100000 !important;
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 dark:bg-slate-950 dark:text-white transition">
  <main class="max-w-5xl mx-auto p-4 pb-20">

    <header class="bg-white dark:bg-slate-900 rounded-3xl p-5 shadow-sm mb-4 transition">
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-xs text-slate-500 dark:text-slate-400">ADMIN PANEL</p>
          <h1 id="pageTitle" class="text-3xl font-bold mt-1">สร้าง Event</h1>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">
            ระบบขายภาพผ่าน LINE LIFF + Supabase
          </p>
        </div>

        <button
          type="button"
          onclick="toggleDarkMode()"
          id="darkBtn"
          class="shrink-0 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-2xl px-4 py-3 font-bold transition"
        >
          🌙 Dark
        </button>
      </div>
    </header>

    <section class="bg-white dark:bg-slate-900 rounded-3xl p-5 shadow-sm transition">
      <div class="space-y-5">

        <div>
          <label class="font-bold block mb-2">ชื่อ Event</label>
          <input
            id="eventTitle"
            type="text"
            placeholder="เช่น Bangwad Charity Run 2026"
            class="w-full bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl p-4 outline-none"
          />
        </div>

        <div>
          <label class="font-bold block mb-2">รายละเอียด</label>
          <textarea
            id="eventDescription"
            rows="4"
            placeholder="รายละเอียดงาน"
            class="w-full bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl p-4 outline-none resize-none"
          ></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="font-bold block mb-2">วันที่จัดงาน</label>

            <input id="eventDate" type="hidden" />

            <button
              type="button"
              id="eventDateBtn"
              onclick="openDatePicker()"
              class="custom-picker-btn bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl p-4 outline-none"
            >
              <span id="eventDateText" class="text-slate-400">เลือกวันที่จัดงาน</span>
              <span>📅</span>
            </button>
          </div>

          <div>
            <label class="font-bold block mb-2">ราคาภาพ</label>
            <input
              id="photoPrice"
              type="number"
              value="50"
              inputmode="numeric"
              class="w-full bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl p-4 outline-none"
            />
          </div>
        </div>

        <div>
          <label class="font-bold block mb-2">สถานะ</label>

          <input id="eventStatus" type="hidden" value="draft" />

          <button
            type="button"
            id="eventStatusBtn"
            onclick="openStatusPicker()"
            class="custom-picker-btn bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl p-4 outline-none"
          >
            <span id="eventStatusText">Draft</span>
            <span>⌄</span>
          </button>
        </div>

        <div>
          <label class="font-bold block mb-2">รูป Cover Event</label>
          <input
            id="coverInput"
            type="file"
            accept="image/*"
            class="w-full bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl p-4"
          />

          <img
            id="coverPreview"
            class="hidden mt-4 rounded-2xl w-full max-h-[420px] object-cover"
            alt="Cover Preview"
          />
        </div>

        <button
          type="button"
          onclick="createNewEvent()"
          id="createBtn"
          class="w-full bg-slate-900 dark:bg-white dark:text-slate-900 text-white rounded-2xl py-4 font-bold text-lg"
        >
          สร้าง Event
        </button>

        <button
          type="button"
          onclick="cancelEditEvent()"
          id="cancelEditBtn"
          class="hidden w-full bg-slate-200 dark:bg-slate-800 dark:text-white text-slate-700 rounded-2xl py-4 font-bold text-lg"
        >
          ยกเลิกการแก้ไข
        </button>

      </div>
    </section>

    <section class="mt-6 bg-white dark:bg-slate-900 rounded-3xl p-5 shadow-sm transition">
      <div class="flex items-center justify-between mb-4">
        <div>
          <p class="text-xs text-slate-500 dark:text-slate-400">EVENTS</p>
          <h2 class="text-2xl font-bold">รายการ Event</h2>
        </div>

        <button
          type="button"
          onclick="loadEvents()"
          class="bg-slate-900 dark:bg-white dark:text-slate-900 text-white rounded-2xl px-4 py-2 font-bold"
        >
          Refresh
        </button>
      </div>

      <div id="eventList" class="space-y-4"></div>
    </section>

  </main>

  <div id="datePicker" class="picker-backdrop">
    <div class="picker-panel">
      <div class="flex items-center justify-between gap-3">
        <button
          type="button"
          onclick="changePickerMonth(-1)"
          class="bg-slate-100 dark:bg-slate-800 rounded-2xl px-4 py-3 font-bold"
        >
          ‹
        </button>

        <div class="text-center">
          <p class="text-xs text-slate-500 dark:text-slate-400">เลือกวันที่จัดงาน</p>
          <h3 id="pickerMonthTitle" class="text-xl font-bold"></h3>
        </div>

        <button
          type="button"
          onclick="changePickerMonth(1)"
          class="bg-slate-100 dark:bg-slate-800 rounded-2xl px-4 py-3 font-bold"
        >
          ›
        </button>
      </div>

      <div class="date-grid">
        <div class="day-name">อา</div>
        <div class="day-name">จ</div>
        <div class="day-name">อ</div>
        <div class="day-name">พ</div>
        <div class="day-name">พฤ</div>
        <div class="day-name">ศ</div>
        <div class="day-name">ส</div>
      </div>

      <div id="dateGrid" class="date-grid"></div>

      <button
        type="button"
        onclick="closeDatePicker()"
        class="w-full mt-4 bg-slate-200 dark:bg-slate-800 rounded-2xl py-3 font-bold"
      >
        ปิด
      </button>
    </div>
  </div>

  <div id="statusPicker" class="picker-backdrop">
    <div class="picker-panel">
      <div class="flex items-center justify-between mb-2">
        <div>
          <p class="text-xs text-slate-500 dark:text-slate-400">STATUS</p>
          <h3 class="text-xl font-bold">เลือกสถานะ Event</h3>
        </div>

        <button
          type="button"
          onclick="closeStatusPicker()"
          class="bg-slate-100 dark:bg-slate-800 rounded-2xl px-4 py-3 font-bold"
        >
          ✕
        </button>
      </div>

      <div id="statusOptions"></div>
    </div>
  </div>

  <script>
    const db = window.sb || window.supabase.createClient(
      CONFIG.SUPABASE_URL,
      CONFIG.SUPABASE_ANON_KEY
    );

    const BUCKET_NAME = "event-covers";

    let selectedCover = null;
    let allEvents = [];
    let editingEventId = null;
    let editingCoverUrl = null;

    let pickerYear = new Date().getFullYear();
    let pickerMonth = new Date().getMonth();

    const statusList = [
      { value: "draft", label: "Draft" },
      { value: "active", label: "Active" },
      { value: "published", label: "Published" },
      { value: "closed", label: "Closed" },
      { value: "archived", label: "Archived" }
    ];

    document.addEventListener("DOMContentLoaded", async () => {
      initDarkMode();
      setupPreview();
      renderStatusOptions();
      updateStatusDisplay("draft");
      await loadEvents();
    });

    function setupPreview() {
      const input = document.getElementById("coverInput");

      input.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        selectedCover = file;

        const img = document.getElementById("coverPreview");
        img.src = URL.createObjectURL(file);
        img.classList.remove("hidden");
      });
    }

    function openDatePicker() {
      const currentValue = document.getElementById("eventDate").value;

      if (currentValue) {
        const parts = currentValue.split("-");
        pickerYear = Number(parts[0]);
        pickerMonth = Number(parts[1]) - 1;
      } else {
        const now = new Date();
        pickerYear = now.getFullYear();
        pickerMonth = now.getMonth();
      }

      renderDatePicker();
      document.getElementById("datePicker").classList.add("show");
    }

    function closeDatePicker() {
      document.getElementById("datePicker").classList.remove("show");
    }

    function changePickerMonth(step) {
      pickerMonth += step;

      if (pickerMonth < 0) {
        pickerMonth = 11;
        pickerYear -= 1;
      }

      if (pickerMonth > 11) {
        pickerMonth = 0;
        pickerYear += 1;
      }

      renderDatePicker();
    }

    function renderDatePicker() {
      const monthNames = [
        "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
        "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
      ];

      document.getElementById("pickerMonthTitle").textContent =
        `${monthNames[pickerMonth]} ${pickerYear + 543}`;

      const grid = document.getElementById("dateGrid");
      grid.innerHTML = "";

      const firstDay = new Date(pickerYear, pickerMonth, 1).getDay();
      const daysInMonth = new Date(pickerYear, pickerMonth + 1, 0).getDate();
      const selected = document.getElementById("eventDate").value;

      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement("div");
        blank.className = "date-cell disabled";
        blank.textContent = "";
        grid.appendChild(blank);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateValue =
          `${pickerYear}-${String(pickerMonth + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "date-cell";
        btn.textContent = day;

        if (dateValue === selected) {
          btn.classList.add("active");
        }

        btn.onclick = () => {
          setEventDate(dateValue);
          closeDatePicker();
        };

        grid.appendChild(btn);
      }
    }

    function setEventDate(value) {
      document.getElementById("eventDate").value = value;

      const text = document.getElementById("eventDateText");
      text.textContent = formatThaiDate(value);
      text.classList.remove("text-slate-400");
    }

    function formatThaiDate(value) {
      if (!value) return "เลือกวันที่จัดงาน";

      const date = new Date(value + "T00:00:00");
      const monthNames = [
        "ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.",
        "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."
      ];

      return `${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear() + 543}`;
    }

    function openStatusPicker() {
      renderStatusOptions();
      document.getElementById("statusPicker").classList.add("show");
    }

    function closeStatusPicker() {
      document.getElementById("statusPicker").classList.remove("show");
    }

    function renderStatusOptions() {
      const box = document.getElementById("statusOptions");
      const current = document.getElementById("eventStatus").value || "draft";

      box.innerHTML = "";

      statusList.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "status-option";
        btn.textContent = item.label;

        if (item.value === current) {
          btn.classList.add("active");
        }

        btn.onclick = () => {
          updateStatusDisplay(item.value);
          closeStatusPicker();
        };

        box.appendChild(btn);
      });
    }

    function updateStatusDisplay(value) {
      const found = statusList.find(item => item.value === value) || statusList[0];

      document.getElementById("eventStatus").value = found.value;
      document.getElementById("eventStatusText").textContent = found.label;
    }

    function generateSlug(text) {
      const base = String(text || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^a-z0-9ก-๙-]/g, "")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");

      return base || `event-${Date.now()}`;
    }

    async function uploadCover(file) {
      if (!file) return null;

      const ext = file.name.split(".").pop();
      const filename = `${crypto.randomUUID()}.${ext}`;
      const path = `covers/${filename}`;

      const { error: uploadError } = await db
        .storage
        .from(BUCKET_NAME)
        .upload(path, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadError) throw uploadError;

      const { data } = db
        .storage
        .from(BUCKET_NAME)
        .getPublicUrl(path);

      return data.publicUrl;
    }

    async function createNewEvent() {
      try {
        const btn = document.getElementById("createBtn");
        btn.disabled = true;
        btn.textContent = editingEventId ? "กำลังบันทึก..." : "กำลังสร้าง...";

        const title = document.getElementById("eventTitle").value.trim();
        const description = document.getElementById("eventDescription").value.trim();
        const eventDate = document.getElementById("eventDate").value;
        const photoPrice = Number(document.getElementById("photoPrice").value || 50);
        const status = document.getElementById("eventStatus").value || "draft";

        if (!title) {
          throw new Error("กรุณากรอกชื่อ Event");
        }

        let coverUrl = editingCoverUrl || null;

        if (selectedCover) {
          Swal.fire({
            title: "กำลังอัปโหลด Cover...",
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
          });

          coverUrl = await uploadCover(selectedCover);
        }

        const payload = {
          title,
          description,
          event_date: eventDate || null,
          cover_url: coverUrl,
          photo_price: photoPrice,
          status
        };

        let data = null;
        let error = null;

        if (editingEventId) {
          const result = await db
            .from("events")
            .update(payload)
            .eq("id", editingEventId)
            .select()
            .single();

          data = result.data;
          error = result.error;
        } else {
          payload.slug = `${generateSlug(title)}-${Date.now()}`;

          const result = await db
            .from("events")
            .insert(payload)
            .select()
            .single();

          data = result.data;
          error = result.error;
        }

        if (error) throw error;

        Swal.fire({
          icon: "success",
          title: editingEventId ? "แก้ไข Event สำเร็จ" : "สร้าง Event สำเร็จ",
          html: `
            <div style="text-align:left">
              <p><b>Event ID:</b></p>
              <p style="word-break:break-all">${data.id}</p>

              <hr style="margin:12px 0">

              <p><b>URL Event:</b></p>
              <p style="word-break:break-all">../event.html?event=${data.id}</p>
            </div>
          `
        });

        clearForm();
        await loadEvents();

      } catch (err) {
        console.error(err);

        Swal.fire(
          "เกิดข้อผิดพลาด",
          err.message || "บันทึก Event ไม่สำเร็จ",
          "error"
        );

      } finally {
        const btn = document.getElementById("createBtn");
        btn.disabled = false;
        btn.textContent = editingEventId ? "บันทึกการแก้ไข Event" : "สร้าง Event";
      }
    }

    async function loadEvents() {
      const box = document.getElementById("eventList");

      box.innerHTML = `
        <div class="text-center py-10 text-slate-400">
          กำลังโหลด...
        </div>
      `;

      const { data, error } = await db
        .from("events")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);

        box.innerHTML = `
          <div class="text-red-500">
            โหลด Event ไม่สำเร็จ
          </div>
        `;
        return;
      }

      allEvents = data || [];

      if (!allEvents.length) {
        box.innerHTML = `
          <div class="text-center py-10 text-slate-400">
            ยังไม่มี Event
          </div>
        `;
        return;
      }

      box.innerHTML = "";

      allEvents.forEach(event => {
        const card = document.createElement("div");
        card.className =
          "border border-slate-200 dark:border-slate-700 rounded-3xl overflow-hidden bg-white dark:bg-slate-900 transition";

        card.innerHTML = `
          <div class="grid md:grid-cols-[260px_1fr]">
            <img
              src="${event.cover_url || 'https://placehold.co/800x600?text=EVENT'}"
              class="w-full h-full object-cover aspect-video bg-slate-200 dark:bg-slate-800"
              alt="Event Cover"
            >

            <div class="p-4">
              <div class="flex justify-between gap-3">
                <div>
                  <h3 class="text-2xl font-bold">
                    ${escapeHtml(event.title || "-")}
                  </h3>

                  <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">
                    ${escapeHtml(event.description || "-")}
                  </p>
                </div>

                <span class="bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full text-xs font-bold h-fit">
                  ${escapeHtml(event.status || "-")}
                </span>
              </div>

              <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4 text-sm">
                <div>
                  <p class="text-slate-400">วันที่</p>
                  <p class="font-bold">${event.event_date || "-"}</p>
                </div>

                <div>
                  <p class="text-slate-400">ราคาภาพ</p>
                  <p class="font-bold">
                    ฿${Number(event.photo_price || 0).toLocaleString()}
                  </p>
                </div>

                <div>
                  <p class="text-slate-400">Event ID</p>
                  <p class="font-bold text-xs break-all">${event.id}</p>
                </div>

                <div>
                  <p class="text-slate-400">เปิด Event</p>
                  <a
                    href="../event.html?event=${event.id}"
                    target="_blank"
                    class="font-bold text-blue-600 dark:text-blue-400"
                  >
                    เปิดหน้า Event
                  </a>
                </div>
              </div>

              <div class="mt-5">
                <button
                  type="button"
                  onclick="toggleMenu('${event.id}')"
                  class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-2xl py-3 font-bold transition"
                >
                  ⚙️ จัดการ Event
                </button>

                <div
                  id="menu-${event.id}"
                  class="hidden mt-3 grid grid-cols-1 md:grid-cols-5 gap-2"
                >
                  <a
                    href="../event.html?event=${event.id}"
                    target="_blank"
                    class="text-center bg-slate-900 text-white rounded-2xl py-3 font-bold"
                  >
                    ดูภาพ
                  </a>

                  <a
                    href="upload.html?event=${event.id}"
                    target="_blank"
                    class="text-center bg-emerald-600 text-white rounded-2xl py-3 font-bold"
                  >
                    Upload รูป
                  </a>

                  <a
                    href="process-faces.html?event=${event.id}"
                    target="_blank"
                    class="text-center bg-blue-600 text-white rounded-2xl py-3 font-bold"
                  >
                    Process Faces
                  </a>

                  <button
                    type="button"
                    onclick="startEditEvent('${event.id}')"
                    class="bg-amber-500 text-white rounded-2xl py-3 font-bold"
                  >
                    แก้ไข
                  </button>

                  <button
                    type="button"
                    onclick="deleteEventDeep('${event.id}')"
                    class="bg-red-600 text-white rounded-2xl py-3 font-bold"
                  >
                    ลบ Event
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;

        box.appendChild(card);
      });
    }

    function toggleMenu(eventId) {
      const menu = document.getElementById(`menu-${eventId}`);
      if (!menu) return;
      menu.classList.toggle("hidden");
    }

    function startEditEvent(eventId) {
      const event = allEvents.find(e => String(e.id) === String(eventId));

      if (!event) {
        Swal.fire("ไม่พบข้อมูล", "ไม่พบ Event ที่ต้องการแก้ไข", "error");
        return;
      }

      editingEventId = event.id;
      editingCoverUrl = event.cover_url || null;
      selectedCover = null;

      document.getElementById("eventTitle").value = event.title || "";
      document.getElementById("eventDescription").value = event.description || "";
      setEventDate(event.event_date || "");
      document.getElementById("photoPrice").value = event.photo_price || 50;
      updateStatusDisplay(event.status || "draft");
      document.getElementById("coverInput").value = "";

      const img = document.getElementById("coverPreview");

      if (editingCoverUrl) {
        img.src = editingCoverUrl;
        img.classList.remove("hidden");
      } else {
        img.src = "";
        img.classList.add("hidden");
      }

      document.getElementById("pageTitle").textContent = "แก้ไข Event";
      document.getElementById("createBtn").textContent = "บันทึกการแก้ไข Event";
      document.getElementById("cancelEditBtn").classList.remove("hidden");

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function cancelEditEvent() {
      clearForm();
    }

    async function deleteEventDeep(eventId) {
      const event = allEvents.find(e => String(e.id) === String(eventId));
      const eventTitle = event?.title || eventId;

      const result = await Swal.fire({
        icon: "warning",
        title: "ลบ Event นี้?",
        html: `
          <div style="text-align:left">
            <p><b>${escapeHtml(eventTitle)}</b></p>

            <p style="color:#dc2626;margin-top:8px">
              ระบบจะลบ Event, รูปทั้งหมด, faces และไฟล์ใน Bucket
            </p>

            <p style="margin-top:8px">
              การลบนี้ไม่สามารถย้อนกลับได้
            </p>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: "ลบถาวร",
        cancelButtonText: "ยกเลิก",
        confirmButtonColor: "#dc2626"
      });

      if (!result.isConfirmed) return;

      try {
        Swal.fire({
          title: "กำลังลบ Event...",
          text: "กำลังลบข้อมูลและไฟล์รูปภาพทั้งหมด",
          allowOutsideClick: false,
          didOpen: () => Swal.showLoading()
        });

        const response = await fetch(
          `${CONFIG.SUPABASE_URL}/functions/v1/delete-event-deep`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: CONFIG.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${CONFIG.SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify({
              event_id: eventId
            })
          }
        );

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "ลบ Event ไม่สำเร็จ");
        }

        Swal.fire({
          icon: "success",
          title: "ลบสำเร็จ",
          html: `
            <div style="text-align:left">
              <p>ลบ Event สำเร็จแล้ว</p>
              <p>ลบรูปในตาราง: <b>${data.deleted_photos || 0}</b> รายการ</p>
              <p>ลบไฟล์รูปภาพ: <b>${data.deleted_photo_files || data.deleted_files || 0}</b> ไฟล์</p>
              <p>ลบไฟล์ Cover: <b>${data.deleted_cover_files || 0}</b> ไฟล์</p>
            </div>
          `
        });

        await loadEvents();

      } catch (err) {
        console.error(err);

        Swal.fire(
          "เกิดข้อผิดพลาด",
          err.message || "ไม่สามารถลบ Event ได้",
          "error"
        );
      }
    }

    function clearForm() {
      document.getElementById("eventTitle").value = "";
      document.getElementById("eventDescription").value = "";
      document.getElementById("eventDate").value = "";

      const dateText = document.getElementById("eventDateText");
      dateText.textContent = "เลือกวันที่จัดงาน";
      dateText.classList.add("text-slate-400");

      document.getElementById("photoPrice").value = "50";
      updateStatusDisplay("draft");
      document.getElementById("coverInput").value = "";

      const img = document.getElementById("coverPreview");
      img.src = "";
      img.classList.add("hidden");

      selectedCover = null;
      editingEventId = null;
      editingCoverUrl = null;

      document.getElementById("pageTitle").textContent = "สร้าง Event";
      document.getElementById("createBtn").textContent = "สร้าง Event";
      document.getElementById("cancelEditBtn").classList.add("hidden");
    }

    function toggleDarkMode() {
      const html = document.documentElement;
      html.classList.toggle("dark");

      const isDark = html.classList.contains("dark");
      localStorage.setItem("darkMode", isDark ? "1" : "0");

      updateDarkButton();
    }

    function initDarkMode() {
      const saved = localStorage.getItem("darkMode");

      if (saved === "1") {
        document.documentElement.classList.add("dark");
      }

      updateDarkButton();
    }

    function updateDarkButton() {
      const btn = document.getElementById("darkBtn");
      if (!btn) return;

      const isDark = document.documentElement.classList.contains("dark");
      btn.innerHTML = isDark ? "☀️ Light" : "🌙 Dark";
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
